{% extends 'rh/base.html' %}
{% block content %}
<div class="form-card">
    <h2>Confirmar exclusão</h2>
    <p>Deseja excluir o registro de <strong>{{ object.funcionario }}</strong> em <strong>{{ object.data }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirmar</button>
        <a href="{% url 'registro_list' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
