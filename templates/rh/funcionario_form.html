{% extends 'rh/base.html' %}
{% block content %}
<div class="form-card">
    <h2>{% if object %}Editar{% else %}Novo{% endif %} Funcionário</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
        <a href="{% url 'funcionario_list' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
